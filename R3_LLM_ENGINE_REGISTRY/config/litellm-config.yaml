# R3 LiteLLM Gateway Config
# All 14 Ollama routes pre-configured — starts ready, no registration script needed.
#
# IMPORTANT (Docker):
#   localhost:11434  →  host.docker.internal:11434  (RAZER, Docker Desktop Windows)
#   192.168.1.226    →  stays as-is (APPSEN, LAN IP)
#
# Start:  docker run -d --name r3-litellm -p 4000:4000 --add-host host.docker.internal:host-gateway
#           -v %CD%\config\litellm-config.yaml:/app/config.yaml
#           -e LITELLM_MASTER_KEY=r3-local
#           ghcr.io/berriai/litellm:main-latest --config /app/config.yaml --port 4000
# Or use: .\install\Start-R3-LiteLLM.ps1

general_settings:
  master_key: r3-local

litellm_settings:
  drop_params: true # ignore unsupported params (e.g. n, logprobs) from clients
  request_timeout: 120
  num_retries: 2

model_list:
  # ── CODE ──────────────────────────────────────────────────────────────────────
  - model_name: r3/code
    litellm_params:
      model: ollama_chat/deepseek-coder:6.7b
      api_base: http://host.docker.internal:11434

  - model_name: r3/code-alt
    litellm_params:
      model: ollama_chat/qwen2.5-coder:latest
      api_base: http://host.docker.internal:11434

  - model_name: r3/code-fallback
    litellm_params:
      model: ollama_chat/codellama:7b
      api_base: http://host.docker.internal:11434

  # ── REASONING ─────────────────────────────────────────────────────────────────
  - model_name: r3/reasoning
    litellm_params:
      model: ollama_chat/deepseek-r1:latest
      api_base: http://host.docker.internal:11434

  - model_name: r3/reasoning-alt
    litellm_params:
      model: ollama_chat/qwen3:latest
      api_base: http://host.docker.internal:11434

  # ── FAST ──────────────────────────────────────────────────────────────────────
  - model_name: r3/fast
    litellm_params:
      model: ollama_chat/gemma2:2b
      api_base: http://host.docker.internal:11434

  - model_name: r3/fast-alt
    litellm_params:
      model: ollama_chat/qwen2.5:3b
      api_base: http://host.docker.internal:11434

  # ── CHAT ──────────────────────────────────────────────────────────────────────
  - model_name: r3/chat
    litellm_params:
      model: ollama_chat/mistral:latest
      api_base: http://host.docker.internal:11434

  - model_name: r3/chat-heavy
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://host.docker.internal:11434

  # ── LARGE ─────────────────────────────────────────────────────────────────────
  - model_name: r3/large
    litellm_params:
      model: ollama_chat/mixtral:latest
      api_base: http://host.docker.internal:11434

  - model_name: r3/large-alt
    litellm_params:
      model: ollama_chat/nemotron-cascade-2:latest
      api_base: http://host.docker.internal:11434

  # ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
  - model_name: r3/autocomplete
    litellm_params:
      model: ollama_chat/phi3:mini
      api_base: http://host.docker.internal:11434

  # ── APPSEN (192.168.1.226) ────────────────────────────────────────────────────
  - model_name: r3/embed
    litellm_params:
      model: ollama/nomic-embed-text:latest
      api_base: http://192.168.1.226:11434

  - model_name: r3/appsen-chat
    litellm_params:
      model: ollama_chat/llama3.2:latest
      api_base: http://192.168.1.226:11434
