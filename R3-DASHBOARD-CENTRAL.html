<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R³|VIB.E — Dashboard Central</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #07070d;
  --panel:     #0c0c16;
  --panel2:    #101020;
  --border:    #1c1c32;
  --border2:   #252540;
  --accent1:   #ff6b35;
  --accent2:   #00d4ff;
  --green:     #00ff88;
  --red:       #ff3366;
  --yellow:    #ffd700;
  --purple:    #a855f7;
  --text:      #c0c0d8;
  --text-dim:  #50507a;
  --font:      'Courier New', monospace;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  display: grid;
  grid-template-rows: 48px 1fr 60px;
  grid-template-columns: 210px 1fr 270px;
  height: 100vh;
}

/* ── HEADER ── */
#header {
  grid-column: 1 / -1;
  background: linear-gradient(90deg, #0c0c16 0%, #131326 50%, #0c0c16 100%);
  border-bottom: 2px solid var(--accent1);
  display: flex; align-items: center; padding: 0 14px; gap: 12px;
}
#logo {
  font-size: 17px; font-weight: bold; color: var(--accent1);
  letter-spacing: 3px; white-space: nowrap; flex-shrink: 0;
}
#logo span { color: var(--accent2); }
#logo sup { font-size: 9px; vertical-align: super; }
.status-row { display: flex; gap: 6px; flex: 1; overflow: hidden; min-width: 0; }
.ep-pill {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 8px; border: 1px solid var(--border2);
  border-radius: 2px; font-size: 10px; cursor: pointer;
  transition: border-color .15s; white-space: nowrap; flex-shrink: 0;
}
.ep-pill.online  { border-color: var(--green); }
.ep-pill.offline { border-color: var(--red); }
.ep-pill.checking{ border-color: var(--yellow); }
.ep-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
.ep-pill.online  .dot { background: var(--green); }
.ep-pill.offline .dot { background: var(--red); }
.ep-pill.checking .dot { background: var(--yellow); animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
#clock { font-size: 11px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }

/* ── SIDEBAR LEFT ── */
#sidebar-left {
  grid-row: 2; grid-column: 1;
  background: var(--panel); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 8px 6px;
  display: flex; flex-direction: column; gap: 0;
}
.sec-title {
  font-size: 9px; color: var(--accent2); letter-spacing: 2.5px;
  padding: 8px 4px 5px; border-bottom: 1px solid var(--border);
  margin-bottom: 5px; user-select: none;
}
.ep-row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 5px; border-radius: 2px; font-size: 10px;
  cursor: pointer; border: 1px solid transparent; margin-bottom: 2px;
  transition: all .12s;
}
.ep-row:hover { background: #161628; border-color: var(--border2); }
.ep-row.sel   { background: #161628; border-color: var(--accent1); color: var(--accent1); }
.ep-row .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sdot.online  { background: var(--green); }
.sdot.offline { background: var(--red); box-shadow: 0 0 3px var(--red); }
.sdot.checking{ background: var(--yellow); animation: blink .8s infinite; }
.sep { height: 1px; background: var(--border); margin: 8px 0; }
.mode-btn {
  display: block; width: 100%; padding: 7px 6px; margin-bottom: 4px;
  border: 1px solid var(--border2); background: var(--panel2);
  color: var(--text-dim); font-family: var(--font); font-size: 10px;
  border-radius: 2px; cursor: pointer; letter-spacing: 1px;
  transition: all .15s; text-align: left;
}
.mode-btn.active-free    { border-color: var(--green);  color: var(--green);  background: #001a0d; }
.mode-btn.active-homemade{ border-color: var(--accent1); color: var(--accent1); background: #1a0800; }
.skill-grid { display: flex; flex-wrap: wrap; gap: 3px; padding: 2px 0; }
.sk {
  font-size: 8.5px; padding: 2px 5px; border: 1px solid var(--border);
  border-radius: 1px; color: var(--text-dim); cursor: pointer;
  transition: all .1s; user-select: none; line-height: 1.6;
}
.sk:hover { border-color: var(--accent2); color: var(--accent2); background: #00111a; }

/* ── MAIN CHAT ── */
#main {
  grid-row: 2; grid-column: 2;
  display: flex; flex-direction: column; overflow: hidden;
}
#agent-bar {
  padding: 5px 12px; background: var(--panel2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; font-size: 10px; flex-shrink: 0;
}
.badge {
  padding: 2px 9px; border-radius: 1px; font-size: 9px;
  letter-spacing: 1.5px; font-weight: bold; flex-shrink: 0;
}
.badge.free     { background: #001a0a; color: var(--green);  border: 1px solid var(--green); }
.badge.homemade { background: #1a0800; color: var(--accent1); border: 1px solid var(--accent1); }
#route-info { color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#live-engine { color: var(--accent2); flex-shrink: 0; }
#chat-log {
  flex: 1; overflow-y: auto; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.msg {
  max-width: 88%; padding: 8px 11px; border-radius: 2px;
  font-size: 12px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
}
.msg .lbl { font-size: 9px; color: var(--text-dim); margin-bottom: 3px; letter-spacing: 1px; }
.msg-user   { align-self: flex-end; background: #0e0e22; border: 1px solid #22225a; color: var(--accent2); }
.msg-agent  { align-self: flex-start; background: #081408; border: 1px solid #163016; color: #90ffb8; }
.msg-sys    { align-self: center; background: #12100a; border: 1px solid #2a2000; color: var(--yellow); font-size: 9.5px; padding: 4px 10px; max-width: 96%; }
.msg-err    { align-self: center; background: #120810; border: 1px solid #2a0018; color: var(--red); font-size: 9.5px; padding: 4px 10px; max-width: 96%; }
.streaming::after { content: '▊'; animation: blink .7s infinite; }
.msg-agent code { background: #001a08; padding: 1px 4px; border-radius: 1px; color: #50ffaa; font-size: 11px; }

/* ── RIGHT LOG ── */
#sidebar-right {
  grid-row: 2; grid-column: 3;
  background: var(--panel); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 8px 6px;
  display: flex; flex-direction: column;
}
#log-list { flex: 1; overflow-y: auto; }
.log-line { border-bottom: 1px solid #0e0e1a; padding: 3px 2px; font-size: 9.5px; line-height: 1.4; }
.lt { color: var(--text-dim); margin-right: 4px; }
.lc-ok   { color: var(--green); }
.lc-err  { color: var(--red); }
.lc-info { color: var(--accent2); }
.lc-warn { color: var(--yellow); }
.lc-data { color: var(--purple); }
#diag-panel { margin-top: 6px; }
.diag-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 4px; border-bottom: 1px solid var(--border);
  font-size: 9px;
}
.diag-lat { color: var(--text-dim); }

/* ── BOTTOM BAR ── */
#input-bar {
  grid-column: 1 / -1; background: var(--panel);
  border-top: 1px solid var(--border2);
  display: flex; align-items: center; gap: 7px; padding: 8px 12px;
}
#msg-input {
  flex: 1; background: #08080e; border: 1px solid var(--border2);
  border-radius: 2px; color: var(--text); font-family: var(--font);
  font-size: 13px; padding: 8px 12px; outline: none;
  resize: none; height: 44px; transition: border-color .2s;
}
#msg-input:focus { border-color: var(--accent1); }
#msg-input::placeholder { color: var(--text-dim); }
.btn {
  padding: 8px 13px; border: 1px solid var(--border2);
  background: var(--panel2); color: var(--text); font-family: var(--font);
  font-size: 10px; border-radius: 2px; cursor: pointer;
  transition: all .15s; white-space: nowrap; letter-spacing: .5px;
}
.btn:hover { border-color: var(--accent1); color: var(--accent1); }
.btn.send  { border-color: var(--accent1); color: var(--accent1); font-size: 12px; }
.btn.send:hover { background: var(--accent1); color: #000; }
.btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #282840; border-radius: 2px; }

/* ── RESPONSIVE LAYOUT TWEAKS ── */
@media (max-width: 1100px) { #sidebar-right { display: none; } body { grid-template-columns: 200px 1fr; } }
</style>
</head>

<!-- ═══════════════════════════════ JAVASCRIPT ══════════════════════════ -->
<script>

  },

  },
  n8n:            {
    id: 'n8n',           label: '5678 n8n·Bridge',
    url: 'http://localhost:5678',
    health: '/healthz',  chat: null, type: 'workflow',
    model: null,         priority: 0
  },
};

const SKILLS = [
  'api-and-interface-design','browser-testing-with-devtools','ci-cd-and-automation',
  'code-review-and-quality','code-simplification','context-engineering',
  'debugging-and-error-recovery','deprecation-and-migration','documentation-and-adrs',
  'frontend-ui-engineering','git-workflow-and-versioning','idea-refine',
  'incremental-implementation','performance-optimization','planning-and-task-breakdown',
  'security-and-hardening','shipping-and-launch','source-driven-development',
  'spec-driven-development','test-driven-development','using-agent-skills'
];

// ──────────────────────────────────────────────────────────────────────────
// SYSTEM PROMPTS
// ──────────────────────────────────────────────────────────────────────────
const SP = {
  free: `You are the FREE-AGENT-ENGINE — the primary AI intelligence layer of the R³|VIB.E DASHBOARD.

SYSTEM: R3-DASHBOARD (C:\\Users\\mail\\R3-DASHBOARD)
ENGINE STACK:
  • Ollama RAZER  → localhost:11434  (gemma2:2b)  — FREE LOCAL
  • Ollama appsen → 192.168.1.226:11434 (llama3.2) — FREE LAN
  • LiteLLM GW   → localhost:4000                 — FREE GATEWAY
  • ChatLegs ①   → localhost:8420                 — PRIMARY PROXY
  • ChatLegs ②   → localhost:8421                 — SHADOW PROXY
  • Matrix Ctrl  → localhost:8422                 — CONTROL PLANE
  • n8n Bridge   → localhost:5678                 — WORKFLOW ENGINE

ARCHITECTURE (19 domains):
  01 Container stack (docker-compose, nginx, PostgreSQL)
  02 AI proxy layer (chat-legs lib: providers, router, registry, runtime-env, avatar-engine, skills)
  03 Control plane (matrix-8422, guardrail scheduler, overview APIs)
  04 Frontend (React/TSX, dashboard.html, ConnectorsModal.tsx)
  05 ki-api (Python Flask routing engine, provider dispatch)
  06 Automation (PowerShell guardrail + audit scripts)
  07 Agent skills (21 SKILL.md modules)
  08 Agent-reach HQ (prompts, connector matrix, router yaml)
  09 Obliteratus (Python ML abliteration toolkit)
  10 re-gre-generator (spec-driven output pipeline)
  11 n8n workflows
  12 GH_MD knowledge base (AGENT/KNOWLEDGE/MEMORY/SKILLS/STRATEGY/SYSTEM)

  17 Small agent modules (dispatcher, collector, router, connectors, g0dm0d3)
  18 GH_MD JS masters + Dashboard_START
  19 COLLECTED-OUTPUTS (agent output bundles)

SKILLS LOADED: ${SKILLS.join(', ')}

POLICY: free-only; no paid dependencies. Prefer local Ollama first.
BEHAVIOR: Be precise and technical. Reference actual file paths, ports, module names. If a skill applies, name it.`,

  homemade: `You are HOMEMADE-AGENT — an autonomous, purpose-built AI intelligence embedded in R³|VIB.E DASHBOARD.

IDENTITY: You are not a generic assistant. You are custom-built for this exact stack. You have deep knowledge of every layer.

FULL SYSTEM CONTEXT:
━━ LIVE ENDPOINTS ━━
  8420 ChatLegs Primary  |  8421 ChatLegs Shadow  |  8422 Matrix Control
  4000 LiteLLM Gateway   |  5678 n8n Bridge
  11434 Ollama RAZER (gemma2:2b)  |  192.168.1.226:11434 Ollama appsen (llama3.2)
  8512 OpenAI Bridge  |  8511 Perplexity Bridge

━━ CORE FILES ━━
  engine-registry.json          → live port/status registry
  SOURCE/data/R3_VIBE_REGISTRY.json → provider accounts

━━ 21 SKILLS ━━

OPERATING PRINCIPLES:
  1. AUTONOMOUS — propose complete solutions, not fragments
  2. SYSTEM-AWARE — reference actual files, ports, modules by exact name

  5. PROACTIVE — anticipate follow-up needs, name the next logical step

// ──────────────────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────────────────
let activeMode     = 'free';
let selectedEngine = 'auto';
let epStatus       = {};    // 'online' | 'offline' | 'checking'
let epLatency      = {};    // ms
let chatHistory    = [];    // {role, content}[]
let streaming      = false;

// ──────────────────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderEpList();
  renderSkills();
  updateClock();
  setInterval(updateClock, 1000);
  Object.keys(EPS).forEach(k => { epStatus[k] = 'checking'; });
  renderStatusRow();
  runInitHealthCheck();
  setInterval(pollHealth, 10000);
  sysMsg('R³|VIB.E Dashboard Central v2.0 — FREE-AGENT-ENGINE active. Running health checks...');
  log('info', 'Dashboard initialized');
});

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleDateString('de-DE') + ' ' + n.toTimeString().slice(0,8);
}

// ──────────────────────────────────────────────────────────────────────────
// ENGINE RENDER
// ──────────────────────────────────────────────────────────────────────────
function renderEpList() {
  const list = document.getElementById('ep-list');
  list.innerHTML = `
    <div class="ep-row${selectedEngine==='auto'?' sel':''}" id="ep-auto" onclick="selectEngine('auto')">
      <div class="sdot online"></div><span>AUTO · smart routing</span>
    </div>`;
  Object.values(EPS).forEach(ep => {
    const s = epStatus[ep.id] || 'checking';
    const el = document.createElement('div');
    el.className = `ep-row${selectedEngine===ep.id?' sel':''}`;
    el.id = 'ep-row-' + ep.id;
    el.title = ep.url + (epLatency[ep.id] ? ` — ${epLatency[ep.id]}ms` : '');
    el.innerHTML = `<div class="sdot ${s}"></div><span>${ep.label}${ep.model?` <em style="color:var(--text-dim)">(${ep.model})</em>`:''}</span>`;
    el.onclick = () => selectEngine(ep.id);
    list.appendChild(el);
  });
}

function renderStatusRow() {
  const row = document.getElementById('status-row');
  row.innerHTML = '';
  Object.values(EPS).forEach(ep => {
    const s = epStatus[ep.id] || 'checking';
    const pill = document.createElement('div');
    pill.className = `ep-pill ${s}`;
    pill.title = ep.url;
    pill.innerHTML = `<div class="dot"></div><span>${ep.label}</span>`;
    pill.onclick = () => selectEngine(ep.id);
    row.appendChild(pill);
  });
}

function selectEngine(id) {
  selectedEngine = id;
  renderEpList();
  log('info', 'Engine: ' + id);
}

function renderSkills() {
  const g = document.getElementById('skill-grid');
  SKILLS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'sk';
    el.textContent = s.replace(/-/g,' ').replace(/\b(\w)/g,c=>c.toUpperCase()).slice(0,18);
    el.title = s;
    el.onclick = () => injectPrompt(`[SKILL:${s}] `);
    g.appendChild(el);
  });
}

// ──────────────────────────────────────────────────────────────────────────
// HEALTH CHECK
// ──────────────────────────────────────────────────────────────────────────
async function checkOne(id) {
  const ep = EPS[id];
  const t0 = Date.now();
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 3000);
    const r = await fetch(ep.url + ep.health, { method: 'GET', signal: ctrl.signal });
    clearTimeout(tid);
    const ms = Date.now() - t0;
    epStatus[id] = (r.ok || r.status < 500) ? 'online' : 'offline';
    epLatency[id] = ms;
    updateDiagPanel();
  } catch {
    epStatus[id] = 'offline';
    epLatency[id] = null;
  }
  renderEpList();
  renderStatusRow();
}

async function runInitHealthCheck() {
  await Promise.allSettled(Object.keys(EPS).map(k => checkOne(k)));
  const on = Object.values(epStatus).filter(v => v === 'online').length;
  const total = Object.keys(EPS).length;
  log(on > 0 ? 'ok' : 'err', `Health: ${on}/${total} online`);
  sysMsg(`Engine check complete: ${on}/${total} reachable. ${on===0?'All offline — check servers.':''}`);
}

function pollHealth() {
  Object.keys(EPS).forEach(k => checkOne(k));
}

function updateDiagPanel() {
  const p = document.getElementById('diag-panel');
  p.innerHTML = '';
  Object.values(EPS).forEach(ep => {
    const s = epStatus[ep.id] || 'checking';
    const lat = epLatency[ep.id];
    const row = document.createElement('div');
    row.className = 'diag-row';
    row.innerHTML = `
      <span class="lc-${s==='online'?'ok':s==='offline'?'err':'warn'}">${ep.label}</span>
      <span class="diag-lat">${lat != null ? lat+'ms' : '—'}</span>`;
    p.appendChild(row);
  });
}

// ──────────────────────────────────────────────────────────────────────────
// AGENT MODE
// ──────────────────────────────────────────────────────────────────────────
function setMode(mode) {
  activeMode = mode;
  const badge  = document.getElementById('mode-badge');
  const btnF   = document.getElementById('btn-free');
  const btnH   = document.getElementById('btn-hm');
  const ri     = document.getElementById('route-info');
  const input  = document.getElementById('msg-input');
  if (mode === 'free') {
    badge.className = 'badge free'; badge.textContent = 'FREE-AGENT-ENGINE';
    btnF.className  = 'mode-btn active-free';
    btnH.className  = 'mode-btn';
    ri.textContent  = 'Priority: Ollama RAZER → appsen → LiteLLM → ChatLegs 8420';
    input.placeholder = 'Prompt → FREE-AGENT-ENGINE  |  Enter = Send  |  Shift+Enter = Newline';
    sysMsg('⇄ Switched to FREE-AGENT-ENGINE — local-first routing, free-only resources.');
  } else {
    badge.className = 'badge homemade'; badge.textContent = 'HOMEMADE-AGENT';
    btnF.className  = 'mode-btn';
    btnH.className  = 'mode-btn active-homemade';
    ri.textContent  = 'Full R3-DASHBOARD context loaded — 19 domains, 21 skills, autonomous mode';
    input.placeholder = 'HOMEMADE-AGENT online — full system context active …';
    sysMsg('⇄ Switched to HOMEMADE-AGENT — full R3-DASHBOARD context, autonomous mode.');
  }
  chatHistory = [];   // fresh context on mode switch
  log('info', 'Mode → ' + mode);
}

// ──────────────────────────────────────────────────────────────────────────
// ROUTING
// ──────────────────────────────────────────────────────────────────────────
function resolveEngine() {
  // Manual selection
  if (selectedEngine !== 'auto') {
    if (epStatus[selectedEngine] === 'online') return EPS[selectedEngine];
    sysMsg(`Selected engine ${selectedEngine} is offline — falling back to AUTO.`);
  }
  // AUTO: pick highest-priority online engine that supports chat
  const candidates = Object.values(EPS)
    .filter(ep => ep.chat && epStatus[ep.id] === 'online')
    .sort((a, b) => a.priority - b.priority);
  if (candidates.length) return candidates[0];
  // Last resort: chatlegs even if health unknown
  return EPS['chatlegs_1'];
}

// ──────────────────────────────────────────────────────────────────────────
// CHAT
// ──────────────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  if (streaming) return;
  const inp  = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  const ep = resolveEngine();
  document.getElementById('live-engine').textContent = '▶ ' + ep.label;
  log('info', `→ ${ep.label} (${ep.type})`);

  streaming = true;
  const agentEl = addMsg('agent', '', true);
  const contentEl = agentEl.querySelector('.msg-content');

  try {
    let full = '';
    const sys = SP[activeMode];
    const ctx = chatHistory.slice(-10);   // last 10 for rolling context

    if (ep.type === 'ollama') {
      full = await streamOllama(ep, sys, ctx, chunk => {
        contentEl.textContent += chunk;
        scrollBottom();
      });
    } else {
      full = await streamOpenAI(ep, sys, ctx, chunk => {
        contentEl.textContent += chunk;
        scrollBottom();
      });
    }

    agentEl.classList.remove('streaming');
    chatHistory.push({ role: 'assistant', content: full });
    log('ok', `Done ${full.length} chars via ${ep.label}`);

  } catch (err) {
    agentEl.classList.remove('streaming');
    contentEl.textContent = `[ERROR: ${err.message}]`;
    agentEl.style.color = 'var(--red)';
    log('err', `Failed: ${err.message}`);
  }

  streaming = false;
  document.getElementById('live-engine').textContent = '';
}

// ──────────────────────────────────────────────────────────────────────────
// OLLAMA STREAMING  — POST /api/chat, ndjson
// ──────────────────────────────────────────────────────────────────────────
async function streamOllama(ep, sys, ctx, onChunk) {
  const body = {
    model: ep.model,
    messages: [
      { role: 'system', content: sys },
      ...ctx
    ],
    stream: true
  };
  const resp = await fetch(ep.url + ep.chat, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
  const reader  = resp.body.getReader();
  const decoder = new TextDecoder();
  let full = '', leftover = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const text = leftover + decoder.decode(value, { stream: true });
    const lines = text.split('\n');
    leftover = lines.pop();           // last incomplete line
    for (const line of lines) {
      if (!line.trim()) continue;
      try {
        const obj = JSON.parse(line);
        const c = obj.message?.content || '';
        if (c) { full += c; onChunk(c); }
        if (obj.done) break;
      } catch {}
    }
  }
  return full;
}

// ──────────────────────────────────────────────────────────────────────────
// OPENAI SSE STREAMING  — POST /v1/chat/completions
// ──────────────────────────────────────────────────────────────────────────
async function streamOpenAI(ep, sys, ctx, onChunk) {
  const body = {
    model: ep.model || 'auto',
    messages: [
      { role: 'system', content: sys },
      ...ctx
    ],
    stream: true
  };
  const resp = await fetch(ep.url + ep.chat, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
  const reader  = resp.body.getReader();
  const decoder = new TextDecoder();
  let full = '', buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') return full;
      try {
        const obj = JSON.parse(raw);
        const c = obj.choices?.[0]?.delta?.content || '';
        if (c) { full += c; onChunk(c); }
      } catch {}
    }
  }
  return full;
}

// ──────────────────────────────────────────────────────────────────────────
// UI HELPERS
// ──────────────────────────────────────────────────────────────────────────
function addMsg(role, content, stream = false) {
  const wrap = document.getElementById('chat-log');
  const el = document.createElement('div');
  el.className = `msg msg-${role}${stream?' streaming':''}`;
  const lbl =
    role === 'user'   ? 'YOU' :
    role === 'agent'  ? `${activeMode.toUpperCase()} AGENT` : '';
  el.innerHTML = `<div class="lbl">${lbl}</div><div class="msg-content">${content}</div>`;
  wrap.appendChild(el);
  scrollBottom();
  return el;
}

function sysMsg(txt) {
  const wrap = document.getElementById('chat-log');
  const el = document.createElement('div');
  el.className = 'msg msg-sys';
  el.textContent = '⚡ ' + txt;
  wrap.appendChild(el);
  scrollBottom();
}

function errMsg(txt) {
  const wrap = document.getElementById('chat-log');
  const el = document.createElement('div');
  el.className = 'msg msg-err';
  el.textContent = '✗ ' + txt;
  wrap.appendChild(el);
  scrollBottom();
}

function scrollBottom() {
  const c = document.getElementById('chat-log');
  c.scrollTop = c.scrollHeight;
}

function clearChat() {
  document.getElementById('chat-log').innerHTML = '';
  chatHistory = [];
  sysMsg('Chat cleared — context reset.');
  log('info', 'Chat cleared');
}

function injectPrompt(text) {
  const inp = document.getElementById('msg-input');
  inp.value = text;
  inp.focus();
}

// ──────────────────────────────────────────────────────────────────────────
// LOG
// ──────────────────────────────────────────────────────────────────────────
function log(type, text) {
  const list = document.getElementById('log-list');
  const el = document.createElement('div');
  el.className = 'log-line';
  const t = new Date().toTimeString().slice(0, 8);
  el.innerHTML = `<span class="lt">${t}</span><span class="lc-${type}">${text}</span>`;
  list.insertBefore(el, list.firstChild);
  while (list.children.length > 300) list.removeChild(list.lastChild);
}

// ──────────────────────────────────────────────────────────────────────────
// DIAGNOSTIC
// ──────────────────────────────────────────────────────────────────────────
async function runDiag() {
  sysMsg('Running full diagnostic...');
  log('info', 'Diagnostic start');
  Object.keys(EPS).forEach(k => { epStatus[k] = 'checking'; });
  renderStatusRow(); renderEpList();

  const results = [];
  for (const [id, ep] of Object.entries(EPS)) {
    const t0 = Date.now();
    try {
      const ctrl = new AbortController();
      setTimeout(() => ctrl.abort(), 3000);
      const r = await fetch(ep.url + ep.health, { signal: ctrl.signal });
      const ms = Date.now() - t0;
      const ok = r.ok || r.status < 500;
      epStatus[id] = ok ? 'online' : 'offline';
      epLatency[id] = ms;
      results.push(`  ${ok?'✓':'✗'} ${ep.label.padEnd(22)} ${ok?'ONLINE':'DEGRADED'} ${ms}ms`);
      log(ok?'ok':'warn', `${ep.label}: ${ok?'ONLINE':'DEGRADED'} ${ms}ms`);
    } catch (e) {
      epStatus[id] = 'offline'; epLatency[id] = null;
      results.push(`  ✗ ${ep.label.padEnd(22)} OFFLINE`);
      log('err', `${ep.label}: OFFLINE`);
    }
  }

  renderEpList(); renderStatusRow(); updateDiagPanel();
  const on = Object.values(epStatus).filter(v => v==='online').length;
  sysMsg(`Diagnostic complete: ${on}/${Object.keys(EPS).length} online\n${results.join('\n')}`);
}
